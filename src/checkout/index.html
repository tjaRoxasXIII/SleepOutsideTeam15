<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <h2>Review & Place Your Order</h2>
      
      <form id="checkout-form" class="checkout-form">
        <fieldset>
          <legend>Shipping Address</legend>
          <label>First Name: <input type="text" name="fname" required /></label>
          <label>Last Name: <input type="text" name="lname" required /></label>
          <label>Street Address: <input type="text" name="street" required /></label>
          <label>City: <input type="text" name="city" required /></label>
          <label>State: <input type="text" name="state" required /></label>
          <label>Zip Code: <input type="text" id="zip" name="zip" required /></label>
        </fieldset>

        <fieldset>
          <legend>Payment Details</legend>
          <label>Card Number: <input type="text" name="cardNumber" value="1234123412341234" required /></label>
          <label>Expiration Date: <input type="text" name="expiration" value="12/28" required /></label>
          <label>Security Code: <input type="text" name="code" value="123" required /></label>
        </fieldset>

        <section class="order-summary" id="order-summary">
          <h3>Order Summary</h3>
          <p>Subtotal: <span id="subtotal">$0.00</span></p>
          <p>Tax (6%): <span id="tax">$0.00</span></p>
          <p>Shipping Estimate: <span id="shipping">$0.00</span></p>
          <p><strong>Order Total: <span id="orderTotal">$0.00</span></strong></p>
        </section>

        <button type="submit" id="checkoutSubmit">Place Order</button>
      </form>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
