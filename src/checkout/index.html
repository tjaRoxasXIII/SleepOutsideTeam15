<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sleep Outside | Checkout</title>
        <link rel="stylesheet" href="/css/style.css" />
        <script type="module" src="/js/checkout.js"></script>
    </head>

    <body>
        <header class="divider" id="main-header"></header>

        <main class="divider">
            <section class="checkout-container">
                <h2>Review & Place Your Order</h2>

                <div class="checkout-grid">
                    <!-- Order Summary Section -->
                    <aside class="order-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping Estimate:</span>
                            <span id="shipping"></span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (6%):</span>
                            <span id="tax"></span>
                        </div>
                        <div class="summary-row">
                            <span>Total Items:</span>
                            <span id="items-amount">0</span>
                        </div>
                        <hr />
                        <div class="summary-row total-row">
                            <span>Order Total:</span>
                            <span id="order-total">$0.00</span>
                        </div>
                    </aside>

                    <!-- Checkout Form -->
                    <form id="checkout-form" novalidate>
                        <fieldset>
                            <legend>Customer Name</legend>
                            <label for="fname">First Name:</label>
                            <input type="text" id="fname" name="fname" required />

                            <label for="lname">Last Name:</label>
                            <input type="text" id="lname" name="lname" required />
                        </fieldset>

                        <fieldset>
                            <legend>Shipping & Billing Address</legend>
                            <label for="street">Street Address:</label>
                            <input type="text" id="street" name="street" required />

                            <label for="city">City:</label>
                            <input type="text" id="city" name="city" required />

                            <label for="state">State:</label>
                            <input type="text" id="state" name="state" required />

                            <label for="zip">Zip Code:</label>
                            <input type="text" id="zip" name="zip" required />
                        </fieldset>

                        <fieldset>
                            <legend>Payment Details</legend>
                            <label for="cardNumber">Credit Card Number:</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9101 1121" required />

                            <label for="expiration">Expiration Date:</label>
                            <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required />

                            <label for="code">Security Code (CVV):</label>
                            <input type="text" id="code" name="code" placeholder="123" required />
                        </fieldset>

                        <button type="submit" id="checkout-btn">Checkout</button>
                    </form>
                </div>
            </section>
        </main>

        <footer id="main-footer"></footer>
    </body>
</html>
