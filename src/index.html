<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SleepOutside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/main.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <div class="hero">
        <img src="/images/banner-sm.jpg" alt="A beautiful campsite in the mountains" />
        <div class="logo-back"></div>
        <p class="hero-title">SleepOutside</p>
      </div>

      <section class="category-cards">
        <h2>Shop by Category</h2>
        <ul class="product-grid">
          <li>
            <a href="/product_listing/index.html?category=tents">
              <img src="/images/noun_Tent_2517.svg" alt="Tents Icon" />
              <h3>Tents</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=backpacks">
              <img src="/images/noun_Backpack_2389275.svg" alt="Backpacks Icon" />
              <h3>Backpacks</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=sleeping-bags">
              <img src="/images/noun_Tent_2517.svg" alt="Sleeping Bags Icon" />
              <h3>Sleeping Bags</h3>
            </a>
          </li>
          <li>
            <a href="/product_listing/index.html?category=hammocks">
              <img src="/images/noun_Backpack_65884.svg" alt="Hammocks Icon" />
              <h3>Hammocks</h3>
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
